<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>7X Filename Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            background:
                linear-gradient(
                    135deg,
                    rgba(10, 6, 21, 0.88) 0%,
                    rgba(31, 21, 68, 0.78) 45%,
                    rgba(61, 42, 156, 0.68) 100%
                ),
                url("timeline-background.png");

            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;

            min-height: 100vh;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        select,
        input {
            background: rgba(26, 15, 61, 0.92);
            border-color: rgba(168, 85, 247, 0.3);
        }

        select:focus,
        input:focus {
            border-color: rgba(216, 180, 254, 0.5);
            outline: none;
            box-shadow: 0 0 0 3px rgba(168, 85, 247, 0.2);
        }

        .card-bg {
            background: rgba(30, 12, 63, 0.72);
            border-color: rgba(168, 85, 247, 0.28);
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.45),
                inset 0 1px 0 rgba(255, 255, 255, 0.06);
        }

        .filename-display {
            background: rgba(26, 15, 61, 0.94);
            border-color: rgba(168, 85, 247, 0.3);
        }

        .copy-button {
            background: linear-gradient(90deg, #6b21a8 0%, #7c3aed 50%, #6b21a8 100%);
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 15px 35px rgba(124, 58, 237, 0.35);
        }

        .copy-button:hover {
            transform: scale(1.02);
            box-shadow: 0 18px 45px rgba(124, 58, 237, 0.45);
        }

        .copy-button:active {
            transform: scale(0.98);
        }

        .copy-button.copied {
            background: #10b981;
        }

        .page-wrap {
            position: relative;
        }

        .header-block {
            position: relative;
            top: -25px;
            margin-bottom: 0;
        }

        .brand-logo {
            width: 120px;
            max-width: 50vw;
            height: auto;
            margin: 0 auto;
            display: block;
            filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.5));
        }

        .filename-title {
            position: relative;
            top: -70px;
        }

        .main-card-wrapper {
            position: relative;
            top: -75px;
        }

        .footer-text {
            position: relative;
            top: -75px;
        }

        @media (min-width: 768px) {
            .brand-logo {
                width: 140px;
            }

            .filename-title {
                top: -82px;
            }

            .main-card-wrapper {
                top: -90px;
            }

            .footer-text {
                top: -90px;
            }
        }
    </style>
</head>

<body class="text-white px-4 py-3 md:px-8 md:py-4">
    <div class="page-wrap max-w-5xl mx-auto">
        
        <!-- Header -->
        <div class="header-block text-center">
            <div class="inline-block">
                <img 
                    src="7x-logo.png" 
                    alt="7X Logo" 
                    class="brand-logo"
                >

                <div class="filename-title text-sm md:text-base font-bold tracking-widest text-purple-200 uppercase leading-none">
                    Filename Generator
                </div>
            </div>
        </div>

        <!-- Main Card -->
        <div class="main-card-wrapper card-bg backdrop-blur-sm border rounded-2xl p-4 md:p-7 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-5">
                
                <!-- Show -->
                <div>
                    <label class="block text-xs font-bold text-purple-200 mb-2 uppercase tracking-wider">
                        Show
                    </label>

                    <select id="show" class="w-full border rounded-xl px-4 py-3 text-white transition-all">
                        <option value="">Select show...</option>
                        <option value="MA">MA - Man Alive</option>
                        <option value="CP">CP - Creator Playbooks</option>
                        <option value="MFC">MFC - Money For Couples</option>
                        <option value="TW">TW - True Wealth</option>
                        <option value="SDSB">SDSB - Socially Distant Sports Bar</option>
                        <option value="TNBS">TNBS - The Nathan Barry Show</option>
                        <option value="IIHIH">IIHIH - Is It Hot In Here</option>
                        <option value="TWC">TWC - True Wealth Clips</option>
                        <option value="MAC">MAC - Man Alive Clips</option>
                    </select>
                </div>

                <!-- Episode -->
                <div>
                    <label class="block text-xs font-bold text-purple-200 mb-2 uppercase tracking-wider">
                        Episode
                    </label>

                    <input 
                        type="text" 
                        id="episode" 
                        placeholder="E034" 
                        class="w-full border rounded-xl px-4 py-3 text-white placeholder-purple-300/40 transition-all font-mono"
                    >
                </div>

                <!-- Guest -->
                <div>
                    <label class="block text-xs font-bold text-purple-200 mb-2 uppercase tracking-wider">
                        Guest / Topic
                    </label>

                    <input 
                        type="text" 
                        id="guest" 
                        placeholder="Callum McDonnell" 
                        class="w-full border rounded-xl px-4 py-3 text-white placeholder-purple-300/40 transition-all"
                    >
                </div>

                <!-- Asset Type -->
                <div>
                    <label class="block text-xs font-bold text-purple-200 mb-2 uppercase tracking-wider">
                        Asset Type
                    </label>

                    <select id="assetType" class="w-full border rounded-xl px-4 py-3 text-white transition-all">
                        <option value="">Select type...</option>
                        <option value="TRAILER">TRAILER</option>
                        <option value="POD">POD (Podcast)</option>
                        <option value="CLIP">CLIP</option>
                        <option value="SHORT">SHORT</option>
                        <option value="THUMB">THUMB (Thumbnail)</option>
                        <option value="IMAGE">IMAGE</option>
                    </select>
                </div>

                <!-- Platform -->
                <div>
                    <label class="block text-xs font-bold text-purple-200 mb-2 uppercase tracking-wider">
                        Platform
                    </label>

                    <select id="platform" class="w-full border rounded-xl px-4 py-3 text-white transition-all">
                        <option value="">Select platform...</option>
                        <option value="YouTube">YouTube</option>
                        <option value="RSS">RSS</option>
                        <option value="Instagram">Instagram</option>
                        <option value="TikTok">TikTok (Shorts)</option>
                        <option value="LinkedIn">LinkedIn</option>
                    </select>
                </div>

                <!-- Ratio -->
                <div>
                    <label class="block text-xs font-bold text-purple-200 mb-2 uppercase tracking-wider">
                        Ratio
                    </label>

                    <select id="ratio" class="w-full border rounded-xl px-4 py-3 text-white transition-all">
                        <option value="">Select ratio...</option>
                        <option value="16x9">16x9 (Landscape)</option>
                        <option value="9x16">9x16 (Vertical / Stories)</option>
                        <option value="1x1">1x1 (Square)</option>
                        <option value="4x5">4x5 (Portrait)</option>
                    </select>
                </div>

                <!-- Asset Title -->
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-purple-200 mb-2 uppercase tracking-wider">
                        Asset Title (if applicable)
                    </label>

                    <input 
                        type="text" 
                        id="title" 
                        placeholder="Meet The Marketing Genius Behind..." 
                        class="w-full border rounded-xl px-4 py-3 text-white placeholder-purple-300/40 transition-all"
                    >
                </div>

                <!-- Version -->
                <div class="md:col-span-2">
                    <label class="block text-xs font-bold text-purple-200 mb-2 uppercase tracking-wider">
                        Version
                    </label>

                    <select id="version" class="w-full border rounded-xl px-4 py-3 text-white transition-all font-mono">
                        <option value="v01">v01</option>
                        <option value="v02">v02</option>
                        <option value="v03">v03</option>
                        <option value="v04">v04</option>
                        <option value="v05">v05</option>
                        <option value="v06">v06</option>
                        <option value="v07">v07</option>
                        <option value="v08">v08</option>
                        <option value="v09">v09</option>
                        <option value="v10">v10</option>
                        <option value="v11">v11</option>
                        <option value="v12">v12</option>
                        <option value="v13">v13</option>
                        <option value="v14">v14</option>
                        <option value="v15">v15</option>
                        <option value="v16">v16</option>
                        <option value="v17">v17</option>
                        <option value="v18">v18</option>
                        <option value="v19">v19</option>
                        <option value="v20">v20</option>
                    </select>
                </div>
            </div>

            <!-- Warning -->
            <div id="warning" class="mt-5 bg-purple-400/10 border border-purple-300/40 rounded-xl p-4 hidden">
                <div class="flex items-center gap-2 text-purple-200 text-sm">
                    <span class="text-xl">⚠️</span>
                    <span class="font-medium">
                        Remove forbidden words: "final", "new", "fixed", "latest"
                    </span>
                </div>
            </div>

            <!-- Generated Filename -->
            <div class="mt-5 md:mt-6 pt-5 md:pt-6 border-t border-purple-400/20">
                <label class="block text-xs font-bold text-purple-200 mb-3 uppercase tracking-wider">
                    Generated Filename
                </label>
                
                <div id="filenameSection" class="space-y-4 hidden">
                    <div 
                        class="filename-display border rounded-xl p-4 font-mono text-xs md:text-sm text-green-300 break-all" 
                        id="filenameDisplay">
                    </div>
                    
                    <button 
                        id="copyButton" 
                        class="copy-button w-full py-4 rounded-xl font-bold text-base md:text-lg text-white shadow-xl">
                        COPY FILENAME
                    </button>
                </div>

                <div id="emptyState" class="filename-display border rounded-xl p-5 text-center text-purple-200/50">
                    <span class="text-3xl mb-2 block opacity-50">📁</span>
                    <p class="text-sm font-medium">
                        Fill in all fields to generate filename
                    </p>
                    <p class="text-xs mt-2 text-purple-300/30" id="missingFields"></p>
                </div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer-text mt-4 md:mt-5 text-center text-purple-300/30 text-xs">
            Auto-generates with today's date • Version defaults to v01 • Increments for revisions
        </div>
    </div>

    <script>
        const show = document.getElementById('show');
        const episode = document.getElementById('episode');
        const guest = document.getElementById('guest');
        const assetType = document.getElementById('assetType');
        const platform = document.getElementById('platform');
        const ratio = document.getElementById('ratio');
        const title = document.getElementById('title');
        const version = document.getElementById('version');

        const filenameDisplay = document.getElementById('filenameDisplay');
        const filenameSection = document.getElementById('filenameSection');
        const emptyState = document.getElementById('emptyState');
        const copyButton = document.getElementById('copyButton');
        const warning = document.getElementById('warning');
        const missingFields = document.getElementById('missingFields');

        function cleanText(text) {
            return text.replace(/[^a-zA-Z0-9]/g, '');
        }

        function getToday() {
            const today = new Date();
            return today.toISOString().split('T')[0];
        }

        function hasForbiddenWords() {
            const forbidden = ['final', 'new', 'fixed', 'latest'];
            const checkText = `${title.value} ${guest.value}`.toLowerCase();

            return forbidden.some(function(word) {
                return checkText.includes(word);
            });
        }

        function generateFilename() {
            const showVal = show.value;
            const episodeVal = episode.value;
            const guestVal = guest.value;
            const assetTypeVal = assetType.value;
            const platformVal = platform.value;
            const ratioVal = ratio.value;
            const titleVal = title.value;
            const versionVal = version.value;

            if (!showVal || !episodeVal || !guestVal || !assetTypeVal || !platformVal || !ratioVal) {
                filenameSection.classList.add('hidden');
                emptyState.classList.remove('hidden');
                
                const missing = [];

                if (!showVal) missing.push('Show');
                if (!episodeVal) missing.push('Episode');
                if (!guestVal) missing.push('Guest');
                if (!assetTypeVal) missing.push('Asset Type');
                if (!platformVal) missing.push('Platform');
                if (!ratioVal) missing.push('Ratio');
                
                missingFields.textContent = `Missing: ${missing.join(', ')}`;
                return;
            }

            const cleanGuest = cleanText(guestVal);
            const cleanTitle = titleVal ? cleanText(titleVal) : '';
            const cleanAssetType = assetTypeVal.replace(/\s+/g, '');
            const cleanPlatform = platformVal.replace(/\s+/g, '');
            const date = getToday();

            const filenameParts = [
                showVal,
                episodeVal,
                cleanGuest,
                cleanAssetType,
                cleanPlatform,
                ratioVal
            ];

            if (cleanTitle) {
                filenameParts.push(cleanTitle);
            }

            filenameParts.push(versionVal, date);
            
            const filename = filenameParts.join('_');

            filenameDisplay.textContent = filename;
            filenameSection.classList.remove('hidden');
            emptyState.classList.add('hidden');

            if (hasForbiddenWords()) {
                warning.classList.remove('hidden');
            } else {
                warning.classList.add('hidden');
            }
        }

        copyButton.addEventListener('click', function() {
            const filename = filenameDisplay.textContent;

            navigator.clipboard.writeText(filename).then(function() {
                copyButton.textContent = '✓ COPIED!';
                copyButton.classList.add('copied');
                
                setTimeout(function() {
                    copyButton.textContent = 'COPY FILENAME';
                    copyButton.classList.remove('copied');
                }, 2000);
            });
        });

        [
            show,
            episode,
            guest,
            assetType,
            platform,
            ratio,
            title,
            version
        ].forEach(function(element) {
            element.addEventListener('input', generateFilename);
            element.addEventListener('change', generateFilename);
        });

        generateFilename();
    </script>
</body>
</html>
